<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="權智匯提供八字、紫微斗數與占卜命理諮詢，助你明辨天時。">
    <meta name="theme-color" content="#160203">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <title>權智匯｜算命占卜命理</title>
    <style>
        :root {
            --bg-night: #160203;
            --gold: #f8e6ae;
            --gold-bright: #fff1c7;
            --text-main: rgba(248, 230, 174, 0.94);
            --panel: rgba(34, 8, 8, 0.6);
            --panel-border: rgba(248, 230, 174, 0.16);
        }

        /* 基礎樣式重置 */
        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-night);
            color: var(--gold);
            font-family: "Noto Serif TC", serif;
            overflow-x: hidden;
        }

        /* 導航列 */
        .navbar {
            position: fixed;
            top: 0; width: 100%;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--panel-border);
            text-align: center;
        }
        .nav-logo {
            color: var(--gold);
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* HERO 區塊：背景圖與標題定位 */
        .hero-stage {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            /* 背景圖：圓環 image_5.png */
            background-image: url('image_5.png'); 
            background-size: contain;
            background-position: center 20%; /* 圓環高度位置 */
            background-repeat: no-repeat;
        }

        .hero-content {
            position: absolute;
            top: 25%; /* 這裡調整標題在圓環中的高度 (對應 Figma Y:100) */
            text-align: center;
            width: 100%;
        }

        .title {
            margin: 0;
            font-size: clamp(3.5rem, 15vw, 6rem); /* 手機與電腦自動縮放 */
            font-weight: 900;
            letter-spacing: 0.5rem;
            color: var(--gold-bright);
            text-shadow: 0 0 20px rgba(248, 230, 174, 0.5), 1px 1px 2px rgba(0,0,0,0.8);
        }

        .title-subtitle {
            margin-top: 10px;
            font-size: 1.2rem;
            letter-spacing: 0.3rem;
            opacity: 0.8;
        }

        /* 介紹文字區 */
        .intro-panel {
            margin-top: 55vh; /* 讓文字避開上方的背景圖 */
            padding: 0 30px;
            text-align: center;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .intro-panel p {
            line-height: 2;
            font-size: 1.05rem;
            color: var(--text-main);
        }

        /* 內容區塊設定（消除左右空位） */
        .onepage-sections {
            width: 92%;
            max-width: 1000px;
            margin: 40px auto 100px;
            display: grid;
            gap: 20px;
        }

        .onepage-block {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 25px;
        }

        .section-title {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 20px;
            color: var(--gold-bright);
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 10px;
        }

        /* 服務清單 */
        .services-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(248, 230, 174, 0.1);
        }

        /* 懸浮按鈕 */
        .whatsapp-cta {
            position: fixed;
            right: 20px; bottom: 20px;
            background: linear-gradient(135deg, #f8e6ae, #d8ac4f);
            color: #160203;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }

        @media (max-width: 600px) {
            .title { font-size: 3.2rem; }
            .hero-stage { background-size: 120%; background-position: center 15%; }
            .intro-panel { margin-top: 45vh; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="nav-logo">權智匯｜命理諮詢</a>
    </nav>

    <section class="hero-stage">
        <div class="hero-content">
            <h1 class="title">權智匯</h1>
            <div class="title-subtitle">天時．地利．人和</div>
        </div>

        <div class="intro-panel">
            <p>
                權衡天時，智啟人生，匯聚祥瑞。<br>
                在人生的轉折點，為您提供最清晰的指引。
            </p>
        </div>
    </section>

    <main class="onepage-sections">
        <section class="onepage-block" id="services">
            <h2 class="section-title">服務項目</h2>
            <div class="services-layout">
                <div class="service-card">
                    <span>八字詳批</span>
                    <strong>$1,288</strong>
                </div>
                <div class="service-card">
                    <span>紫微斗數分析</span>
                    <strong>$1,288</strong>
                </div>
                <div class="service-card">
                    <span>占卜問事</span>
                    <strong>$388</strong>
                </div>
            </div>
        </section>

        <section class="onepage-block">
            <h2 class="section-title">聯絡我們</h2>
            <p style="text-align: center; color: var(--text-main);">
                如果您有任何疑問，歡迎隨時透過 WhatsApp 聯繫我們。<br>
                我們將竭誠為您服務。
            </p>
        </section>
    </main>

    <a href="https://wa.me/85267113958" class="whatsapp-cta" target="_blank">WhatsApp 預約諮詢</a>

</body>
</html>
