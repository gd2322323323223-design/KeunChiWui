<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>權智匯｜極簡時尚命理諮詢</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --black: #1a1a1a;
            --spacing-unit: 140px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--white);
            color: var(--black);
            font-family: "Noto Serif TC", serif;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }

        /* --- 導覽列優化：精簡為黑色粗體關鍵字 --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: rgba(255, 255, 255, 0.98); z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%;
            border-bottom: 0.5px solid #e5e5e5;
        }

        .nav-left { 
            letter-spacing: 0.2rem; 
            font-size: 1.1rem; 
            font-weight: 900; /* 黑色粗體 */
            color: var(--black);
            white-space: nowrap;
        }

        .nav-right a {
            text-decoration: none; color: var(--black);
            font-size: 0.85rem; letter-spacing: 0.15rem;
            border: 1px solid var(--black);
            padding: 10px 18px;
            transition: 0.3s;
            display: inline-block;
            font-weight: 900;
            white-space: nowrap;
        }
        .nav-right a:hover { background: var(--black); color: var(--white); }

        /* --- 品牌標誌與標語 --- */
        .logo-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .qzh-logo { width: 60px; height: 60px; position: relative; margin-bottom: 25px; }
        .logo-line { position: absolute; background: var(--black); }
        .line-top { top: 0; left: 10px; width: 40px; height: 1.5px; }
        .line-bottom { bottom: 0; left: 10px; width: 40px; height: 1.5px; }
        .line-left { top: 10px; left: 0; width: 1.5px; height: 40px; }
        .line-right { top: 10px; right: 0; width: 1.5px; height: 40px; }
        .logo-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; background: var(--black); border-radius: 50%; }

        /* --- Hero Section --- */
        .hero {
            height: 90vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding-top: 80px;
        }
        .hero-title {
            font-size: clamp(3.5rem, 12vw, 6.5rem);
            font-weight: 900; letter-spacing: 1.5rem;
            margin: 0; text-indent: 1.5rem;
        }
        .hero-divider { width: 60px; height: 1.5px; background: var(--black); margin: 50px 0; }
        
        .hero-subtitle { 
            font-size: 1.2rem; font-weight: 400; 
            letter-spacing: 0.6rem; color: #333; 
            text-indent: 0.6rem;
            white-space: nowrap;
        }

        /* --- 服務項目與理念 --- */
        .philosophy { padding: var(--spacing-unit) 20px; max-width: 900px; margin: 0 auto; text-align: center; }
        .philosophy h2 { font-size: 1.1rem; letter-spacing: 0.6rem; margin-bottom: 60px; font-weight: 400; }
        .philosophy p { font-size: 1.4rem; line-height: 2.5; }

        .service-container { width: 100%; }
        .service-block { width: 100%; padding: 120px 10%; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
        .block-1 { background-color: #fcfcfc; }
        .block-2 { background-color: #f5f5f5; }
        .block-3 { background-color: #ededed; }
        .block-4 { background-color: #e2e2e2; }
        .block-1 .block-image, .block-3 .block-image { grid-column: 2; }
        .block-1 .block-content, .block-3 .block-content { grid-column: 1; grid-row: 1; }
        .block-image svg { width: 70%; height: 70%; opacity: 0.8; }
        
        .category-name { font-size: 2.8rem; font-weight: 900; margin-bottom: 60px; letter-spacing: 0.4rem; }
        .item { border-top: 1px solid #ccc; padding-top: 30px; margin-bottom: 40px; }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;}
        .item-title { font-size: 1.6rem; font-weight: 900; }
        .item-price { font-size: 1.8rem; font-weight: 200; font-family: sans-serif; }

        /* --- 預約表單 --- */
        .booking { padding: var(--spacing-unit) 10%; background-color: var(--black); color: var(--white); }
        .booking h2 { font-size: 2.5rem; letter-spacing: 0.8rem; text-align: center; margin-bottom: 80px; font-weight: 900; }
        .form-grid { max-width: 800px; margin: 0 auto; }
        .input-group { margin-bottom: 40px; border-bottom: 0.5px solid #444; }
        .input-group label { font-size: 0.8rem; letter-spacing: 0.2rem; color: #aaa; }
        .input-group input { width: 100%; background: transparent; border: none; color: var(--white); padding: 15px 0; font-size: 1.2rem; outline: none; }
        .btn-submit { display: block; width: 100%; padding: 25px; background: var(--white); color: var(--black); text-align: center; text-decoration: none; font-weight: 900; letter-spacing: 0.8rem; margin-top: 50px; }

        footer { padding: 40px; text-align: center; font-size: 0.8rem; letter-spacing: 0.3rem; color: #888; }

        /* --- 手機版響應式修正 --- */
        @media (max-width: 768px) {
            nav { height: 70px; padding: 0 15px; }
            /* 手機版字體微調，確保不換行 */
            .nav-left { font-size: 0.95rem; letter-spacing: 0.1rem; }
            .nav-right a { font-size: 0.75rem; padding: 8px 12px; letter-spacing: 0.1rem; }
            
            .hero-subtitle { font-size: 0.9rem; letter-spacing: 0.2rem; text-indent: 0.2rem; }
            .hero-title { font-size: 3.2rem; letter-spacing: 0.8rem; text-indent: 0.8rem; }
            
            .service-block { padding: 60px 20px; grid-template-columns: 1fr; gap: 40px; }
            .service-block .block-image { grid-column: 1; grid-row: 1; height: 200px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">八字 · 紫微 · 占卜</div>
        <div class="nav-right">
            <a href="https://wa.me/85267113958?text=您好，我想諮詢權智匯的命理服務。" target="_blank">WHATSAPP 諮詢</a>
        </div>
    </nav>

    <header class="hero">
        <div class="logo-wrap">
            <div class="qzh-logo">
                <div class="logo-line line-top"></div>
                <div class="logo-line line-bottom"></div>
                <div class="logo-line line-left"></div>
                <div class="logo-line line-right"></div>
                <div class="logo-dot"></div>
            </div>
            <p class="hero-subtitle">運籌當下，明辨天時，擇優而行</p>
        </div>
        <h1 class="hero-title">權智匯</h1>
        <div class="hero-divider"></div>
    </header>

    <section class="philosophy">
        <h2>品牌理念</h2>
        <p>本小組由兩位深研中華傳統文化的伙伴共同創立，結合所長，為有緣人提供專業諮詢。真正的命理服務，不是宿命的斷言，而是幫助您看清局勢，作出明智選擇。</p>
    </section>

    <div class="service-container">
        <section class="service-block block-1">
            <div class="block-image">
                <svg viewBox="0 0 100 100"><rect x="30" y="30" width="40" height="40" fill="none" stroke="#d8ac4f" stroke-width="1.5"/><line x1="20" y1="20" x2="80" y2="80" stroke="#1a1a1a" stroke-width="0.5"/></svg>
            </div>
            <div class="block-content">
                <div class="category-name">八字類別</div>
                <div class="item">
                    <div class="item-header"><span class="item-title">八字排盤</span><span class="item-price">$88</span></div>
                    <span class="item-desc">性格批註與基本格局</span>
                </div>
                <div class="item">
                    <div class="item-header"><span class="item-title">八字大批</span><span class="item-price">$2888</span></div>
                    <span class="item-desc">包含命格詳解及半年大運詳批</span>
                </div>
            </div>
        </section>
    </div>

    <section class="booking">
        <h2>預約諮詢</h2>
        <form class="form-grid" id="contactForm">
            <div class="input-group">
                <label>您的稱呼</label>
                <input type="text" name="name" required>
            </div>
            <div class="input-group">
                <label>聯絡方式 (WHATSAPP)</label>
                <input type="text" name="contact" required>
            </div>
            <a href="#" class="btn-submit" id="submitBtn">提交預約請求</a>
        </form>
    </section>

    <footer>&copy; 2026 QUAN ZHI HUI. 版權所有.</footer>

    <script>
        document.getElementById('submitBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const f = new FormData(document.getElementById('contactForm'));
            const text = `您好，我想諮詢預約：\n稱呼：${f.get('name')}\n聯絡：${f.get('contact')}`;
            window.open(`https://wa.me/85267113958?text=${encodeURIComponent(text)}`, '_blank');
        });
    </script>
</body>
</html>
