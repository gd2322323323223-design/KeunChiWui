    <script>
        (function () {
            const STORAGE_KEY = "cw_click_stats";

            function trackClick(eventName) {
                const raw = localStorage.getItem(STORAGE_KEY);
                const stats = raw ? JSON.parse(raw) : {};
                stats[eventName] = (stats[eventName] || 0) + 1;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
                console.log("[tracking]", eventName, stats[eventName]);
            }

            document.querySelectorAll("[data-track]").forEach((node) => {
                node.addEventListener("click", () => {
                    const eventName = node.getAttribute("data-track");
                    if (eventName) {
                        trackClick(eventName);

                });
            });
