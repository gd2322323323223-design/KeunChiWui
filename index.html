<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>權智匯｜運籌當下，明辨天時</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-red: #8b0000; --bg-deep: #300000; --bg-night: #160203;
            --gold: #f8e6ae; --gold-bright: #fff1c7; --gold-soft: #d8ac4f;
            --text-main: rgba(248, 230, 174, 0.94);
            --panel: rgba(34, 8, 8, 0.6);
            --panel-border: rgba(248, 230, 174, 0.2);
        }

        html, body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, var(--bg-red) 0%, var(--bg-deep) 56%, var(--bg-night) 100%);
            color: var(--gold);
            font-family: "Noto Serif TC", serif;
            scroll-behavior: smooth;
        }

        .navbar {
            position: fixed; top: 0; width: 100%; padding: 20px 0;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--panel-border); z-index: 100; text-align: center;
        }

        .nav-logo { color: var(--gold); text-decoration: none; font-weight: 700; letter-spacing: 0.1rem; }

        .hero-section { padding: 160px 20px 60px; text-align: center; }
        .hero-title { font-size: clamp(3.5rem, 12vw, 7rem); margin: 0; color: var(--gold-bright); letter-spacing: 0.5rem; }
        .hero-divider { width: 80px; height: 2px; background: var(--gold-soft); margin: 30px auto; }
        .hero-description { font-size: 1.2rem; line-height: 2; max-width: 800px; margin: 0 auto; color: var(--text-main); }

        .onepage-sections { width: min(1120px, calc(100% - 40px)); margin: 40px auto 100px; display: grid; gap: 30px; }
        
        /* 大區塊方框 */
        .onepage-block {
            border-radius: 24px;
            border: 1px solid var(--panel-border);
            background: var(--panel);
            padding: 40px;
        }

        .section-title {
            text-align: center; font-size: 2.2rem; color: var(--gold-bright); margin-bottom: 30px;
            display: flex; align-items: center; gap: 15px; justify-content: center;
        }
        .section-title::before, .section-title::after { content: ""; flex: 1; max-width: 50px; height: 1px; background: var(--gold-soft); }

        /* --- 服務項目方格設定 (重點修復區) --- */
        .services-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .service-group {
            border-radius: 20px;
            border: 1px solid rgba(248, 230, 174, 0.15);
            background: rgba(0, 0, 0, 0.25);
            padding: 25px;
        }

        .group-title { text-align: center; color: var(--gold-bright); margin-bottom: 20px; font-size: 1.4rem; }

        /* 這是你要求的金色小方格 */
        .service-card {
            border-radius: 14px;
            border: 1px solid rgba(248, 230, 174, 0.3) !important; /* 強制顯示邊框 */
            background: rgba(0, 0, 0, 0.4) !important; /* 強制背景深色 */
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .service-price {
            font-weight: 700;
            color: var(--gold-bright);
            border: 1px solid var(--gold-soft);
            padding: 2px 12px;
            border-radius: 20px;
        }

        /* 諮詢表單小方格 */
        .contact-form-grid input, .contact-form-grid textarea {
            width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 15px;
            border-radius: 12px; border: 1px solid rgba(248, 230, 174, 0.2);
            background: rgba(0, 0, 0, 0.3); color: white; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; padding: 15px; border-radius: 50px; border: none;
            background: linear-gradient(150deg, #fff7db, #f5d685);
            color: #4a1407; font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }

        @media (max-width: 640px) {
            .onepage-block { padding: 20px; }
            .service-card { border-width: 1.5px; } /* 手機版加強邊框厚度 */
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="nav-logo">運籌當下，明辨天時，擇優而行</a>
    </nav>

    <header class="hero-section">
        <h1 class="hero-title">權智匯</h1>
        <div class="hero-divider"></div>
        <p class="hero-description">結合八字深度解析與精準占卜，在人生的十字路口，助您掌握先機。</p>
    </header>

    <main class="onepage-sections">
        
        <section class="onepage-block">
            <h2 class="section-title">品牌理念</h2>
            <div style="text-align: center; line-height: 1.8;">
                <p>在複雜多變的時代中，我們致力於將傳統命理轉化為現代決策的工具。</p>
                <p>權智匯不只提供「算命」，更提供「分析」。我們主張透過八字看清個人格局與起伏，幫助您做出更有利的選擇。</p>
            </div>
        </section>

        <section class="onepage-block">
            <h2 class="section-title">服務項目</h2>
            <div class="services-layout">
                <div class="service-group">
                    <h3 class="group-title">命盤解析</h3>
                    <div class="service-card">
                        <span>八字流年詳批</span>
                        <span class="service-price">NT$ 2,600</span>
                    </div>
                    <div class="service-card">
                        <span>紫微斗數全盤</span>
                        <span class="service-price">NT$ 3,200</span>
                    </div>
                </div>
                <div class="service-group">
                    <h3 class="group-title">即時占卜</h3>
                    <div class="service-card">
                        <span>文王卦 / 梅花易數</span>
                        <span class="service-price">NT$ 800</span>
                    </div>
                    <div class="service-card">
                        <span>測字與擇日</span>
                        <span class="service-price">NT$ 1,200</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="onepage-block">
            <h2 class="section-title">諮詢表單</h2>
            <div class="contact-form-grid">
                <label>稱呼</label>
                <input type="text" placeholder="例如：陳小姐">
                <label>聯絡方式</label>
                <input type="text" placeholder="例如：WhatsApp / 電話">
                <label>問題摘要</label>
                <textarea rows="4" placeholder="例如：想了解今年事業運勢..."></textarea>
                <button class="submit-btn">整理內容並送到 WhatsApp</button>
            </div>
        </section>

    </main>

</body>
</html>
