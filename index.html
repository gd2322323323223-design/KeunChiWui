<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="權智匯提供八字、紫微斗數與占卜命理諮詢，助你明辨天時，為事業、感情與人生規劃作出更穩妥的選擇。">
    <meta name="theme-color" content="#420000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <title>權智匯｜算命占卜命理</title>
    <style>
        :root {
            --bg-red: #8b0000;
            --bg-deep: #300000;
            --bg-night: #160203;
            --gold: #f8e6ae;
            --gold-bright: #fff1c7;
            --gold-soft: #d8ac4f;
            --text-main: rgba(248, 230, 174, 0.94);
            --text-muted: rgba(248, 230, 174, 0.8);
            --panel: rgba(34, 8, 8, 0.42);
            --panel-border: rgba(248, 230, 174, 0.16);
            --radius-pill: 999px;
            --transition-base: transform 0.22s ease, box-shadow 0.22s ease;
        }

        html, body {
            margin: 0; padding: 0; min-height: 100%;
            background: radial-gradient(circle at center, var(--bg-red) 0%, var(--bg-deep) 56%, var(--bg-night) 100%);
            color: var(--gold); font-family: "Noto Serif TC", serif;
            scroll-behavior: smooth;
        }

        /* 導航列 */
        .navbar {
            position: fixed; top: 0; width: 100%; padding: 20px;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--panel-border); z-index: 100;
            display: flex; justify-content: center; box-sizing: border-box;
        }

        .nav-inner { width: 100%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; }
        .nav-cta { background: var(--gold); color: #420000; padding: 8px 18px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        /* 主視覺區 */
        .hero {
            padding: 160px 20px 80px; text-align: center;
        }
        .title { font-size: clamp(3.5rem, 12vw, 8rem); margin: 0; letter-spacing: 10px; text-shadow: 0 0 20px rgba(248,230,174,0.5); }
        .subtitle { font-size: 1.2rem; opacity: 0.8; margin-top: 10px; letter-spacing: 4px; }

        /* 內容區塊 */
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 100px; }
        .block {
            background: var(--panel); border: 1px solid var(--panel-border);
            padding: 40px; border-radius: 24px; margin-bottom: 30px; backdrop-filter: blur(5px);
        }
        h2 { border-bottom: 1px solid var(--panel-border); padding-bottom: 15px; color: var(--gold-bright); }

        /* 服務列表 */
        .service-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid rgba(248,230,174,0.1);
        }
        .price { font-weight: bold; color: var(--gold-bright); font-size: 1.2rem; }

        /* 表單 */
        input, textarea, select {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
            background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); color: #fff;
            box-sizing: border-box;
        }

        .submit-btn {
            display: block; width: 100%; padding: 15px; margin-top: 20px;
            background: linear-gradient(150deg, #fff1c7, #d8ac4f);
            color: #420000; font-weight: bold; border: none; border-radius: 12px;
            cursor: pointer; font-size: 1rem; text-decoration: none; text-align: center;
        }

        /* 懸浮按鈕 */
        .whatsapp-float {
            position: fixed; right: 20px; bottom: 20px;
            background: #25d366; color: white; padding: 12px 25px;
            border-radius: 50px; text-decoration: none; font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 1000;
        }

        @media (max-width: 600px) {
            .block { padding: 25px; }
            .nav-logo { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <div class="nav-logo">權智匯</div>
            <a href="#contact" class="nav-cta">預約諮詢</a>
        </div>
    </nav>

    <header class="hero">
        <h1 class="title">權智匯</h1>
        <p class="subtitle">助你明辨天時，擇優而行</p>
    </header>

    <div class="container">
        <div class="block">
            <h2>✦ 品牌理念</h2>
            <p>我們結合八字、紫微斗數與現代決策邏輯，在人生的轉折點為您提供清晰的方向。無論是事業進退、感情取捨或是流年規劃，權智匯助您看清局勢，做出最穩妥的選擇。</p>
        </div>

        <div class="block" id="services">
            <h2>✦ 諮詢服務</h2>
            <div class="service-item">
                <div>
                    <strong>八字精批 (流年/事業/感情)</strong>
                    <div style="font-size: 0.85rem; opacity: 0.7;">深度解析一生運勢走向</div>
                </div>
                <div class="price">$888</div>
            </div>
            <div class="service-item">
                <div>
                    <strong>占卜問事</strong>
                    <div style="font-size: 0.85rem; opacity: 0.7;">針對單一問題（如換工、分手）提供即時指引</div>
                </div>
                <div class="price">$688</div>
            </div>
        </div>

        <div class="block" id="contact">
            <h2>✦ 快速預約</h2>
            <form id="waForm">
                <input type="text" id="name" placeholder="您的稱呼" required>
                <input type="text" id="birth" placeholder="出生年月日 (如：1990年5月20日 14:00)">
                <select id="service">
                    <option value="八字諮詢">八字諮詢</option>
                    <option value="占卜問事">占卜問事</option>
                    <option value="其他服務">其他服務</option>
                </select>
                <textarea id="message" placeholder="請簡述您想了解的問題..."></textarea>
                <button type="button" class="submit-btn" onclick="sendToWhatsapp()">生成 WhatsApp 預約訊息</button>
            </form>
        </div>
    </div>

    <a href="https://wa.me/85267113958" class="whatsapp-float">WhatsApp 快速諮詢</a>

    <script>
        function sendToWhatsapp() {
            const name = document.getElementById('name').value;
            const birth = document.getElementById('birth').value;
            const service = document.getElementById('service').value;
            const message = document.getElementById('message').value;

            const text = `您好，我想預約權智匯命理諮詢：\n\n稱呼：${name}\n出生資料：${birth}\n項目：${service}\n問題：${message}`;
            const encodedText = encodeURIComponent(text);
            const waUrl = `https://wa.me/85267113958?text=${encodedText}`;
            
            window.open(waUrl, '_blank');
        }
    </script>
</body>
</html>
